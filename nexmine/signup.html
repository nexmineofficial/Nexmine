<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NexMine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen flex items-center justify-center px-6 py-12">
    <div class="max-w-md w-full space-y-8 bg-zinc-900 p-10 rounded-3xl border border-white/5">
        <div class="text-center">
            <img src="https://storage.googleapis.com/generativeai-downloads/images/input_file_0.png" alt="Logo" class="w-24 h-24 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(245,158,11,0.3)]">
            <h2 class="text-3xl font-black mb-2 tracking-tighter bg-gradient-to-b from-amber-200 to-amber-500 bg-clip-text text-transparent">Sign Up</h2>
            <p class="text-white/40 text-sm">Join the NexMine social mining platform</p>
        </div>
        <form class="space-y-6" onsubmit="handleSignup(event)">
            <div>
                <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-2">Username</label>
                <input type="text" id="signup-username" class="w-full bg-black border border-white/10 p-4 rounded-xl focus:border-amber-500 outline-none transition-all" placeholder="Enter unique username" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-2">Email</label>
                <input type="email" id="signup-email" class="w-full bg-black border border-white/10 p-4 rounded-xl focus:border-amber-500 outline-none transition-all" placeholder="Enter your email" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-2">Mobile Number</label>
                <input type="tel" id="signup-mobile" class="w-full bg-black border border-white/10 p-4 rounded-xl focus:border-amber-500 outline-none transition-all" placeholder="Enter mobile number" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-2">Password</label>
                <input type="password" class="w-full bg-black border border-white/10 p-4 rounded-xl focus:border-amber-500 outline-none transition-all" placeholder="Enter your password" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-2">Referral Code (Optional)</label>
                <input type="text" class="w-full bg-black border border-white/10 p-4 rounded-xl focus:border-amber-500 outline-none transition-all" placeholder="Enter referral code">
            </div>
            <div class="flex justify-between items-center text-xs">
                <span class="text-white/40">Already have an account?</span>
                <a href="login.html" class="text-amber-500 font-bold hover:underline">Login</a>
            </div>
            <button type="submit" class="w-full py-4 bg-amber-500 text-black font-black rounded-xl tracking-widest hover:bg-amber-400 transition-all shadow-lg shadow-amber-500/20 uppercase">Sign Up</button>
        </form>
    </div>
    <script src="js/app.js"></script>
</body>
                  </html>
