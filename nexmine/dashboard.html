<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NexMine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (!localStorage.getItem('nexmine_user_email')) {
            window.location.href = "login.html";
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar) sidebar.classList.toggle('-translate-x-full');
            if (overlay) overlay.classList.toggle('hidden');
        }
    </script>
    <style>
        #balance { transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col relative overflow-x-hidden">
    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-zinc-900 z-[100] transform -translate-x-full transition-transform duration-300 ease-in-out border-r border-white/5 flex flex-col shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                <span class="font-black tracking-tighter text-lg bg-gradient-to-r from-amber-200 to-amber-500 bg-clip-text text-transparent">NexMine</span>
            </div>
            <button onclick="toggleSidebar()" class="text-white/40 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 12"></path>
                </svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 relative group">
                <p class="text-[10px] uppercase font-bold text-white/30 tracking-widest mb-1">User Profile</p>
                <div class="flex items-center justify-between">
                    <p id="sidebar-username" class="text-sm font-black text-white">Loading...</p>
                </div>
                <p id="sidebar-email" class="text-[10px] text-white/40 mt-1">Loading...</p>
                <p id="sidebar-mobile" class="text-[10px] text-white/40 mt-1">Loading...</p>
            </div>
            <nav class="space-y-2">
                <a href="referrals.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition-all group">
                    <svg class="w-5 h-5 text-white/40 group-hover:text-amber-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    <span class="text-sm font-bold text-white/70 group-hover:text-white">Referral Network</span>
                </a>
                <a href="active_miners.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition-all group">
                    <svg class="w-5 h-5 text-white/40 group-hover:text-amber-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    <span class="text-sm font-bold text-white/70 group-hover:text-white">Active Miners</span>
                </a>
            </nav>
            <div class="pt-6 border-t border-white/5">
                <button onclick="logout()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-500/10 text-red-500 transition-all group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                    </svg>
                    <span class="text-sm font-bold">Logout</span>
                </button>
            </div>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] hidden"></div>

    <header class="p-6 flex justify-between items-center border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition-all">
                <svg class="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <span class="font-black tracking-tighter text-xl bg-gradient-to-r from-amber-200 to-amber-500 bg-clip-text text-transparent">NexMine</span>
        </div>
        <div class="text-right">
            <p id="user-display-name" class="text-xs text-amber-500 font-black">Loading...</p>
        </div>
    </header>

    <main class="flex-1 p-6 max-w-lg mx-auto w-full space-y-6 pb-24">
        <div class="relative overflow-hidden bg-gradient-to-br from-amber-400 to-orange-600 p-8 rounded-[32px] text-black shadow-2xl">
            <p class="text-xs font-black uppercase tracking-widest opacity-70 mb-2">Total Balance</p>
            <div class="flex items-baseline gap-2">
                <h2 id="balance" class="text-5xl font-black tracking-tighter">0.0000</h2>
                <span class="font-bold text-sm">NXP</span>
            </div>
        </div>

        <div class="bg-zinc-900 p-8 rounded-[32px] border border-white/5 space-y-6">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-white/30 uppercase tracking-widest mb-1">Mining Speed</p>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <p class="text-lg font-black text-white"><span id="mining-speed-value">1.00</span> <span class="text-xs text-white/40">NXP/hr</span></p>
                    </div>
                    <a href="active_miners.html" class="text-[8px] font-bold text-amber-500 uppercase mt-1 block hover:underline">View Active Miners</a>
                </div>
                <div class="text-right">
                    <p id="mining-status" class="text-lg font-black text-white/40 uppercase italic">Inactive</p>
                </div>
            </div>
            <div class="py-4 flex flex-col items-center">
                <div id="timer-display" class="text-5xl font-mono font-black mb-8 text-amber-500 hidden tracking-tighter">24:00:00</div>
                <button id="start-mining-btn" onclick="startMining()" class="w-full py-6 bg-white text-black font-black rounded-[24px] uppercase text-sm">Start Mining</button>
            </div>
        </div>

        <div class="bg-zinc-900 p-6 rounded-[32px] border border-white/5 space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-black uppercase tracking-widest text-white/40">Referral Program</h3>
                <a href="referrals.html" class="text-[10px] font-bold text-amber-500 uppercase bg-amber-500/10 px-3 py-1 rounded-full">Details</a>
            </div>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/5 text-center">
                <p id="ref-earnings" class="text-3xl font-black">0.00</p>
                <span class="text-xs font-bold text-white/40">NXP</span>
            </div>
            <div class="flex gap-2">
                <input id="ref-link" type="text" readonly class="flex-1 bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-xs text-white/60 outline-none">
                <button onclick="copyRefLink(event)" class="bg-amber-500 text-black px-4 py-3 rounded-xl font-black text-[10px] uppercase">Copy</button>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/mining.js"></script>
</body>
  </html>
