<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NexMine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col">
    <!-- Header -->
    <header class="p-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <img src="https://storage.googleapis.com/generativeai-downloads/images/input_file_0.png" alt="Logo" class="w-10 h-10">
            <span class="font-black tracking-tighter text-xl bg-gradient-to-r from-amber-200 to-amber-500 bg-clip-text text-transparent">NexMine</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-email" class="text-sm text-white/50">user@example.com</span>
            <button onclick="logout()" class="text-xs bg-white/5 px-3 py-1 rounded-lg">Logout</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-6 max-w-lg mx-auto w-full space-y-6">
        <!-- Balance Card -->
        <div class="bg-gradient-to-br from-amber-400 to-orange-600 p-8 rounded-[32px] text-black shadow-xl shadow-amber-500/20">
            <p class="text-xs font-black uppercase tracking-widest opacity-60 mb-2">Total Balance</p>
            <div class="flex items-baseline gap-2">
                <h2 id="balance" class="text-5xl font-black">1,250.50</h2>
                <span class="font-bold">NXP</span>
            </div>
        </div>

        <!-- Mining Status -->
        <div class="bg-zinc-900 p-8 rounded-[32px] border border-white/5 space-y-6">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs font-bold text-white/30 uppercase tracking-widest">Mining Speed</p>
                    <p class="text-lg font-bold text-green-500">0.5 NXP/hr</p>
                </div>
                <div class="text-right">
                    <p class="text-xs font-bold text-white/30 uppercase tracking-widest">Status</p>
                    <p id="mining-status" class="text-lg font-bold text-white/60">Inactive</p>
                </div>
            </div>

            <div class="py-4 flex flex-col items-center">
                <div id="timer-display" class="text-4xl font-mono font-black mb-6 text-amber-500 hidden">24:00:00</div>
                <button id="start-mining-btn" onclick="startMining()" class="w-full py-5 bg-white text-black font-black rounded-2xl tracking-widest hover:bg-amber-500 transition-all shadow-lg active:scale-95">
                    START MINING
                </button>
            </div>
        </div>

        <!-- Task List -->
        <div class="space-y-4">
            <h3 class="font-bold px-2">Daily Tasks</h3>
            <div class="space-y-3">
                <div class="bg-zinc-900/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-500/10 rounded-full flex items-center justify-center">T</div>
                        <span class="text-sm font-bold">Telegram Join</span>
                    </div>
                    <span class="text-amber-500 font-bold">+50 NXP</span>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/mining.js"></script>
</body>
                  </html>
